apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-webhook
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mcp-webhook.example.com
    secretName: mcp-webhook-tls
  rules:
  - host: mcp-webhook.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mcp-webhook
            port:
              name: http
