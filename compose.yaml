version: '3.8'

services:
  mcp-webhook:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/mcp-webhook:latest
    container_name: mcp-webhook
    stdin_open: true
    tty: false
    environment:
      - MCP_AUTH_ENABLED=${MCP_AUTH_ENABLED:-false}
      - MCP_AUTH_TYPE=${MCP_AUTH_TYPE:-api_key}
      - MCP_API_KEYS=${MCP_API_KEYS:-}
      - MCP_USERNAME=${MCP_USERNAME:-}
      - MCP_PASSWORD=${MCP_PASSWORD:-}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
