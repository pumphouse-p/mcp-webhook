name: Build and Publish Container

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        mode:
          - name: stdio
            dockerfile: Containerfile
            suffix: ""
          - name: http
            dockerfile: Containerfile.http
            suffix: -http

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.mode.name }} mode
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.mode.suffix }}
            type=ref,event=pr,suffix=${{ matrix.mode.suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.mode.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.mode.suffix }}
            type=semver,pattern={{major}},suffix=${{ matrix.mode.suffix }}
            type=sha,prefix={{branch}}-,suffix=${{ matrix.mode.suffix }}
            type=raw,value=latest${{ matrix.mode.suffix }},enable={{is_default_branch}}

      - name: Build and push ${{ matrix.mode.name }} container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.mode.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Test ${{ matrix.mode.name }} container
        run: |
          if [ "${{ matrix.mode.name }}" = "stdio" ]; then
            # Test stdio mode
            timeout 3 docker run --rm -i ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
          else
            # Test HTTP mode
            docker run --rm -d --name test-http -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-http
            sleep 3
            curl -f http://localhost:3000/health || exit 1
            curl -f http://localhost:3000/ || exit 1
            docker stop test-http
          fi
