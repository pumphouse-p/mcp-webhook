name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-stdio:
    name: Test stdio mode
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test stdio server startup
        run: |
          timeout 2 npm start 2>&1 | tee output.log || true
          grep -q "MCP Webhook Server running on stdio" output.log

      - name: Test stdio with authentication enabled
        run: |
          MCP_AUTH_ENABLED=true \
          MCP_AUTH_TYPE=api_key \
          MCP_API_KEYS=test-key \
          timeout 2 npm start 2>&1 | tee auth_output.log || true
          grep -q "Server authentication: ENABLED" auth_output.log

  test-http:
    name: Test HTTP mode
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start HTTP server
        run: |
          npm run start:http &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3

      - name: Test health endpoint
        run: |
          curl -f http://localhost:3000/health
          curl -s http://localhost:3000/health | grep -q "healthy"

      - name: Test info endpoint
        run: |
          curl -f http://localhost:3000/
          curl -s http://localhost:3000/ | grep -q "MCP Webhook Server"

      - name: Test POST webhook endpoint
        run: |
          curl -f -X POST http://localhost:3000/api/webhook/post \
            -H "Content-Type: application/json" \
            -d '{"url":"https://httpbin.org/post","payload":{"test":true}}'

      - name: Test GET webhook endpoint
        run: |
          curl -f -X POST http://localhost:3000/api/webhook/get \
            -H "Content-Type: application/json" \
            -d '{"url":"https://httpbin.org/get"}'

      - name: Stop server
        if: always()
        run: kill ${{ env.SERVER_PID }} || true

  test-mcp-http:
    name: Test MCP-over-HTTP mode
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start MCP-over-HTTP server
        run: |
          npm run start:mcp-http &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3

      - name: Test health endpoint
        run: |
          curl -f http://localhost:3000/health
          curl -s http://localhost:3000/health | grep -q "healthy"

      - name: Test info endpoint
        run: |
          curl -f http://localhost:3000/
          curl -s http://localhost:3000/ | grep -q "MCP Webhook Server"

      - name: Test MCP initialize
        run: |
          curl -f -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0.0"}},"id":1}' \
            | grep -q "protocolVersion"

      - name: Test MCP tools/list
        run: |
          curl -f -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":2}' \
            | grep -q "webhook_post"

      - name: Test MCP webhook tool call
        run: |
          curl -f -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"webhook_get","arguments":{"url":"https://httpbin.org/get"}},"id":3}' \
            | grep -q "200"

      - name: Run test suite
        run: |
          API_KEY="" SERVER_URL=http://localhost:3000 node scripts/test-mcp-http.js

      - name: Stop server
        if: always()
        run: kill ${{ env.SERVER_PID }} || true

  container-stdio:
    name: Test stdio container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build stdio container
        run: docker build -f Containerfile -t mcp-webhook:test .

      - name: Test stdio container
        run: |
          timeout 3 docker run --rm -i mcp-webhook:test 2>&1 | tee container_output.log || true
          grep -q "MCP Webhook Server running on stdio" container_output.log

  container-http:
    name: Test HTTP container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build HTTP container
        run: docker build -f Containerfile.http -t mcp-webhook:test-http .

      - name: Start HTTP container
        run: |
          docker run --rm -d --name test-http -p 3000:3000 mcp-webhook:test-http
          sleep 3

      - name: Test HTTP container health
        run: |
          curl -f http://localhost:3000/health
          curl -f http://localhost:3000/

      - name: Test HTTP container webhook
        run: |
          curl -f -X POST http://localhost:3000/api/webhook/post \
            -H "Content-Type: application/json" \
            -d '{"url":"https://httpbin.org/post","payload":{"ci":"test"}}'

      - name: Stop HTTP container
        if: always()
        run: docker stop test-http || true

  container-mcp-http:
    name: Test MCP-over-HTTP container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build MCP-over-HTTP container
        run: docker build -f Containerfile.mcp-http -t mcp-webhook:test-mcp-http .

      - name: Start MCP-over-HTTP container
        run: |
          docker run --rm -d --name test-mcp-http -p 3000:3000 mcp-webhook:test-mcp-http
          sleep 3

      - name: Test MCP-over-HTTP container health
        run: |
          curl -f http://localhost:3000/health
          curl -f http://localhost:3000/

      - name: Test MCP protocol via container
        run: |
          curl -f -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0.0"}},"id":1}' \
            | grep -q "protocolVersion"

      - name: Test MCP tool call via container
        run: |
          curl -f -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","method":"tools/call","params":{"name":"webhook_get","arguments":{"url":"https://httpbin.org/get"}},"id":2}' \
            | grep -q "200"

      - name: Stop MCP-over-HTTP container
        if: always()
        run: docker stop test-mcp-http || true
