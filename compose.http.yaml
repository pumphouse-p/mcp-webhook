version: '3.8'

services:
  mcp-webhook:
    build:
      context: .
      dockerfile: Containerfile.http
    image: localhost/mcp-webhook:http
    container_name: mcp-webhook-http
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - MCP_AUTH_ENABLED=${MCP_AUTH_ENABLED:-false}
      - MCP_AUTH_TYPE=${MCP_AUTH_TYPE:-api_key}
      - MCP_API_KEYS=${MCP_API_KEYS:-}
      - MCP_USERNAME=${MCP_USERNAME:-}
      - MCP_PASSWORD=${MCP_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
